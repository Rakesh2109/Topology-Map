<!DOCTYPE html>
<html>
<head>
    <title>IoMT Simulator - Docker Orchestration Topology (World 2)</title>
    <!-- vis.js library -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 20px 30px; background: rgba(30,30,40,0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10;}
        h1 { margin: 0; font-size: 1.5rem; font-weight: 600; color: #e2e8f0; }
        p.subtitle { margin: 5px 0 0 0; color: #94a3b8; font-size: 0.9rem; }
        #network_canvas { flex: 1; min-height: 0; background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>World 2: Docker Orchestration Architecture</h1>
            <p class="subtitle">Physical Layer-2 Mapping of Docker Bridge Networks and Alpine Containers</p>
        </div>
    </div>
    <div id="network_canvas"></div>

    <script type="text/javascript">
        // FontAwesome icons using raw unicode
        const ICONS = {
            router: '\uf0e8',
            server: '\uf233',
            laptop: '\uf109',
            cloud: '\uf0c2',
            docker: '\uf395',
            heartbeat: '\uf21e',
            lock: '\uf023',
            skull: '\uf714'
        };

        const nodes = new vis.DataSet([
            // Docker Bridge Networks (Groups)
            { id: 'bridge_A', label: 'Docker Net A\n(Internet Edge)\n10.0.0.0/24', shape: 'box', color: {background: '#3b82f6', border: '#2563eb'}, font: {color: 'white', size: 16, bold: true} },
            { id: 'bridge_B', label: 'Docker Net B\n(Enterprise IT)\n10.0.1.0/24', shape: 'box', color: {background: '#6366f1', border: '#4f46e5'}, font: {color: 'white', size: 16, bold: true} },
            { id: 'bridge_C', label: 'Docker Net C\n(Clinical Core)\n10.0.2.0/24', shape: 'box', color: {background: '#8b5cf6', border: '#7c3aed'}, font: {color: 'white', size: 16, bold: true} },
            { id: 'bridge_D', label: 'Docker Net D\n(Guest WiFi)\n10.0.3.0/24', shape: 'box', color: {background: '#0ea5e9', border: '#0284c7'}, font: {color: 'white', size: 16, bold: true} },
            { id: 'bridge_E', label: 'Docker Net E\n(IoMT Subnet)\n10.0.4.0/24', shape: 'box', color: {background: '#10b981', border: '#059669'}, font: {color: 'white', size: 16, bold: true} },
            { id: 'bridge_F', label: 'Docker Net F\n(BMS Facility)\n10.0.5.0/24', shape: 'box', color: {background: '#f59e0b', border: '#d97706'}, font: {color: 'white', size: 16, bold: true} },

            // Docker Routing Interfaces
            { id: 'FW_A', label: 'FW_eth0', shape: 'icon', icon: {face: '"Font Awesome 5 Free"', weight: '900', code: ICONS.router, size: 40, color: '#f87171'} },
            { id: 'FW_B', label: 'FW_eth1', shape: 'icon', icon: {face: '"Font Awesome 5 Free"', weight: '900', code: ICONS.router, size: 40, color: '#f87171'} },
            { id: 'FW_C', label: 'FW_eth2', shape: 'icon', icon: {face: '"Font Awesome 5 Free"', weight: '900', code: ICONS.router, size: 40, color: '#f87171'} },
            { id: 'FW_E', label: 'FW_eth4', shape: 'icon', icon: {face: '"Font Awesome 5 Free"', weight: '900', code: ICONS.router, size: 40, color: '#f87171'} },

            // External Threat Actors
            { id: 'ext_apt', label: 'Extern APT\n(Hacker)', shape: 'icon', icon: {face: '"Font Awesome 5 Free"', weight: '900', code: ICONS.skull, size: 50, color: '#ef4444'} },

            // Example Alpine Containers
            { id: 'web_server', label: 'WebServer\n(Alpine Container)', shape: 'icon', icon: {face: '"Font Awesome 5 Brands"', weight: '400', code: ICONS.docker, size: 40, color: '#e2e8f0'} },
            { id: 'vpn_gw', label: 'VPN Gateway\n(Alpine Container)', shape: 'icon', icon: {face: '"Font Awesome 5 Brands"', weight: '400', code: ICONS.docker, size: 40, color: '#e2e8f0'} },
            { id: 'hr_pc', label: 'HR Desktop\n(Alpine Container)', shape: 'icon', icon: {face: '"Font Awesome 5 Brands"', weight: '400', code: ICONS.docker, size: 40, color: '#e2e8f0'} },
            { id: 'ad_server', label: 'Active Directory\n(Alpine Container)', shape: 'icon', icon: {face: '"Font Awesome 5 Brands"', weight: '400', code: ICONS.docker, size: 40, color: '#e2e8f0'} },
            { id: 'pacs', label: 'PACS Server\n(Alpine)', shape: 'icon', icon: {face: '"Font Awesome 5 Brands"', weight: '400', code: ICONS.docker, size: 40, color: '#e2e8f0'} },
            { id: 'ehr', label: 'EHR Database\n(Alpine)', shape: 'icon', icon: {face: '"Font Awesome 5 Brands"', weight: '400', code: ICONS.docker, size: 40, color: '#e2e8f0'} },
            { id: 'patient_mon', label: 'Patient Monitor\n(Alpine)', shape: 'icon', icon: {face: '"Font Awesome 5 Brands"', weight: '400', code: ICONS.docker, size: 40, color: '#e2e8f0'} },
            { id: 'mri', label: 'MRI Scanner\n(Alpine)', shape: 'icon', icon: {face: '"Font Awesome 5 Brands"', weight: '400', code: ICONS.docker, size: 40, color: '#e2e8f0'} }
        ]);

        const edges = new vis.DataSet([
            // Routing Map
            { from: 'FW_A', to: 'FW_B', label: 'Docker Route', color: '#ffcc00', dashes: true },
            { from: 'FW_B', to: 'FW_C', label: 'Docker Route', color: '#ffcc00', dashes: true },
            { from: 'FW_C', to: 'FW_E', label: 'Docker Route', color: '#ffcc00', dashes: true },

            // FW links to Bridges
            { from: 'FW_A', to: 'bridge_A', color: 'rgba(255,255,255,0.2)' },
            { from: 'FW_B', to: 'bridge_B', color: 'rgba(255,255,255,0.2)' },
            { from: 'FW_C', to: 'bridge_C', color: 'rgba(255,255,255,0.2)' },
            { from: 'FW_E', to: 'bridge_E', color: 'rgba(255,255,255,0.2)' },

            // Container to Bridge Links
            { from: 'ext_apt', to: 'bridge_A', color: 'rgba(255,255,255,0.5)', width: 2 },
            { from: 'web_server', to: 'bridge_A', color: 'rgba(255,255,255,0.5)', width: 2 },
            { from: 'vpn_gw', to: 'bridge_A', color: 'rgba(255,255,255,0.5)', width: 2 },
            
            { from: 'hr_pc', to: 'bridge_B', color: 'rgba(255,255,255,0.5)', width: 2 },
            { from: 'ad_server', to: 'bridge_B', color: 'rgba(255,255,255,0.5)', width: 2 },

            { from: 'pacs', to: 'bridge_C', color: 'rgba(255,255,255,0.5)', width: 2 },
            { from: 'ehr', to: 'bridge_C', color: 'rgba(255,255,255,0.5)', width: 2 },

            { from: 'patient_mon', to: 'bridge_E', color: 'rgba(255,255,255,0.5)', width: 2 },
            { from: 'mri', to: 'bridge_E', color: 'rgba(255,255,255,0.5)', width: 2 }
        ]);

        // Load font awesome dynamically
        const faLink = document.createElement('link');
        faLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css';
        faLink.rel = 'stylesheet';
        document.head.appendChild(faLink);

        // Render after font loads
        setTimeout(() => {
            const container = document.getElementById('network_canvas');
            const data = { nodes: nodes, edges: edges };
            const options = {
                physics: {
                    barnesHut: { gravitationalConstant: -3000, centralGravity: 0.3, springLength: 150 },
                    solver: 'barnesHut'
                },
                layout: { hierarchical: { enabled: true, direction: 'UD', sortMethod: 'directed', levelSeparation: 150, nodeSpacing: 200 } }
            };
            new vis.Network(container, data, options);
        }, 500);
    </script>
</body>
</html>
