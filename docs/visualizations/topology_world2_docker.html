<!DOCTYPE html>
<html>
<head>
    <title>IoMT Simulator - Docker Orchestration Topology (World 2)</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 20px 40px; background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 10; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 1.6rem; font-weight: 700; color: #f1f5f9; letter-spacing: -0.5px; }
        p.subtitle { margin: 6px 0 0 0; color: #94a3b8; font-size: 0.95rem; font-weight: 500; }
        #network_canvas { flex: 1; min-height: 0; background-color: #0f172a; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>World 2: Docker Orchestration Architecture</h1>
            <p class="subtitle">Physical Layer-2 Mapping of Isolated Docker Bridge Networks and Alpine Linux Containers</p>
        </div>
    </div>
    <div id="network_canvas"></div>

    <script type="text/javascript">
        // Standard Vis.js node structures (No external font dependencies required)
        const nodes = new vis.DataSet([
            // Gateway/Host Layer
            { id: 'host', label: 'Docker Daemon\n(Host OS)', shape: 'database', color: {background: '#475569', border: '#334155'}, font: {color: 'white', size: 16, bold: true}, level: 0 },
            
            // FW Router Container (connects to all bridges)
            { id: 'fw', label: 'Hospital Gateway Router\n(Alpine FW Container)', shape: 'box', color: {background: '#f59e0b', border: '#d97706'}, font: {color: 'white', size: 16, bold: true}, level: 1 },

            // Docker Bridge Networks
            { id: 'bridge_A', label: 'Zone A: Internet Edge\n[docker0 bridge]\n10.0.0.0/24', shape: 'box', color: {background: '#3b82f6', border: '#2563eb'}, font: {color: 'white', size: 14}, level: 2 },
            { id: 'bridge_B', label: 'Zone B: Enterprise IT\n[docker1 bridge]\n10.0.1.0/24', shape: 'box', color: {background: '#8b5cf6', border: '#7c3aed'}, font: {color: 'white', size: 14}, level: 2 },
            { id: 'bridge_C', label: 'Zone C: Clinical Core\n[docker2 bridge]\n10.0.2.0/24', shape: 'box', color: {background: '#0ea5e9', border: '#0284c7'}, font: {color: 'white', size: 14}, level: 2 },
            { id: 'bridge_E', label: 'Zone E: IoMT Subnet\n[docker4 bridge]\n10.0.4.0/24', shape: 'box', color: {background: '#10b981', border: '#059669'}, font: {color: 'white', size: 14}, level: 2 },

            // External Actor
            { id: 'ext_apt', label: '💀 External APT\n(Threat Actor)', shape: 'ellipse', color: {background: '#ef4444', border: '#b91c1c'}, font: {color: 'white', size: 14, bold: true}, level: 3 },

            // Standard Containers (Level 3)
            { id: 'web_server', label: 'Web Server\n(Alpine)', shape: 'ellipse', color: {background: '#e2e8f0', border: '#94a3b8'}, font: {color: '#0f172a', size: 12}, level: 3 },
            { id: 'vpn_gw', label: 'VPN Gateway\n(Alpine)', shape: 'ellipse', color: {background: '#e2e8f0', border: '#94a3b8'}, font: {color: '#0f172a', size: 12}, level: 3 },
            
            { id: 'hr_pc', label: 'HR Desktop\n(Alpine)', shape: 'ellipse', color: {background: '#e2e8f0', border: '#94a3b8'}, font: {color: '#0f172a', size: 12}, level: 3 },
            { id: 'ad_server', label: 'Active Directory\n(Alpine)', shape: 'ellipse', color: {background: '#e2e8f0', border: '#94a3b8'}, font: {color: '#0f172a', size: 12}, level: 3 },

            { id: 'pacs', label: 'PACS Imaging\n(Alpine)', shape: 'ellipse', color: {background: '#e2e8f0', border: '#94a3b8'}, font: {color: '#0f172a', size: 12}, level: 3 },
            { id: 'ehr', label: 'EHR Base\n(Alpine)', shape: 'ellipse', color: {background: '#e2e8f0', border: '#94a3b8'}, font: {color: '#0f172a', size: 12}, level: 3 },

            { id: 'patient_mon', label: 'Patient Monitor\n(Alpine)', shape: 'ellipse', color: {background: '#e2e8f0', border: '#94a3b8'}, font: {color: '#0f172a', size: 12}, level: 3 },
            { id: 'infusion', label: 'Infusion Pump\n(Alpine)', shape: 'ellipse', color: {background: '#e2e8f0', border: '#94a3b8'}, font: {color: '#0f172a', size: 12}, level: 3 }
        ]);

        const edges = new vis.DataSet([
            // Host creates Firewall
            { from: 'host', to: 'fw', color: '#94a3b8', width: 2, label: 'runs' },

            // FW routing interfaces to all bridges
            { from: 'fw', to: 'bridge_A', color: '#fcd34d', width: 2, dashes: true, label: 'eth0' },
            { from: 'fw', to: 'bridge_B', color: '#fcd34d', width: 2, dashes: true, label: 'eth1' },
            { from: 'fw', to: 'bridge_C', color: '#fcd34d', width: 2, dashes: true, label: 'eth2' },
            { from: 'fw', to: 'bridge_E', color: '#fcd34d', width: 2, dashes: true, label: 'eth4' },

            // Bridge A (Internet Edge)
            { from: 'bridge_A', to: 'ext_apt', color: '#cbd5e1', width: 2, label: 'veth' },
            { from: 'bridge_A', to: 'web_server', color: '#cbd5e1', width: 2, label: 'veth' },
            { from: 'bridge_A', to: 'vpn_gw', color: '#cbd5e1', width: 2, label: 'veth' },

            // Bridge B (Enterprise IT)
            { from: 'bridge_B', to: 'hr_pc', color: '#cbd5e1', width: 2, label: 'veth' },
            { from: 'bridge_B', to: 'ad_server', color: '#cbd5e1', width: 2, label: 'veth' },

            // Bridge C (Clinical Core)
            { from: 'bridge_C', to: 'pacs', color: '#cbd5e1', width: 2, label: 'veth' },
            { from: 'bridge_C', to: 'ehr', color: '#cbd5e1', width: 2, label: 'veth' },

            // Bridge E (IoMT)
            { from: 'bridge_E', to: 'patient_mon', color: '#cbd5e1', width: 2, label: 'veth' },
            { from: 'bridge_E', to: 'infusion', color: '#cbd5e1', width: 2, label: 'veth' }
        ]);

        const container = document.getElementById('network_canvas');
        const data = { nodes: nodes, edges: edges };
        const options = {
            layout: { 
                hierarchical: { 
                    enabled: true, 
                    direction: 'UD', 
                    sortMethod: 'directed', 
                    levelSeparation: 150, 
                    nodeSpacing: 250 
                } 
            },
            physics: { enabled: false },
            edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 } }
        };
        new vis.Network(container, data, options);
    </script>
</body>
</html>
